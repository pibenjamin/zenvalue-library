services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zbv_app
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - .:/var/www/html:cached
      - zbv_vendor:/var/www/html/vendor
      - zbv_node_modules:/var/www/html/node_modules
      - zbv_storage_logs:/var/www/html/storage/logs
      - zbv_bootstrap_cache:/var/www/html/bootstrap/cache
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    networks:
      - zbv_network
    depends_on:
      - db

  vite:
    image: node:20-alpine
    container_name: zbv_vite
    working_dir: /app
    volumes:
      - .:/app:cached
      - zbv_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5174:5173"
    networks:
      - zbv_network

  db:
    image: mysql:8.0
    container_name: zbv_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zbv
      MYSQL_USER: zbv
      MYSQL_PASSWORD: secret
    ports:
      - "3310:3306"
    volumes:
      - zbv_db_data:/var/lib/mysql
    networks:
      - zbv_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: zbv_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8084:80"
    networks:
      - zbv_network
    depends_on:
      - db

networks:
  zbv_network:
    driver: bridge

volumes:
  zbv_db_data:
  zbv_vendor:
  zbv_node_modules:
  zbv_storage_logs:
  zbv_bootstrap_cache:
